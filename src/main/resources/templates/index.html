<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Curator - AI 뉴스 요약</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="text-center mb-4">📰 News Curator</h1>
    <p class="text-center text-muted mb-5">뉴스 제목을 입력하면 AI가 요약해드립니다</p>

    <!-- 입력 폼 -->
    <div class="card shadow-sm mb-5">
        <div class="card-body">
            <form method="post" th:action="@{/news/add}">
                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">뉴스 제목</label>
                    <input type="text" class="form-control" id="title" name="title"
                           placeholder="요약할 뉴스 제목을 입력하세요" required>
                </div>
                <div class="mb-3">
                    <label for="originalUrl" class="form-label fw-bold">원문 URL (선택)</label>
                    <input type="url" class="form-control" id="originalUrl" name="originalUrl"
                           placeholder="https://example.com/news/...">
                </div>
                <button type="submit" class="btn btn-primary w-100">AI 요약 요청</button>
            </form>
        </div>
    </div>

    <!-- 뉴스 목록 -->
    <h3 class="mb-3">저장된 뉴스</h3>
    <div th:if="${#lists.isEmpty(newsList)}" class="text-center text-muted py-4">
        아직 저장된 뉴스가 없습니다. 위에서 뉴스 제목을 입력해보세요!
    </div>

    <div class="row g-3">
        <div class="col-md-6" th:each="news : ${newsList}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${news.title}">제목</h5>
                    <p class="card-text" th:text="${news.summary}">요약 내용</p>
                </div>
                <div class="card-footer bg-transparent" th:if="${news.originalUrl}">
                    <a th:href="${news.originalUrl}" target="_blank"
                       class="text-decoration-none">원문 보기 →</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
